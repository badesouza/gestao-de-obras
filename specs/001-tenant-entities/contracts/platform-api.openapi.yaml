openapi: 3.1.0
info:
  title: Gestão de Obras — Platform API
  version: 1.0.0
  description: API da camada plataforma (Spec 01). Gestão de entidades/tenants.

servers:
  - url: http://localhost:3000/api/platform/v1
    description: Local development

tags:
  - name: Auth
  - name: Entities

paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Autenticar operador de plataforma
      operationId: platformLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Encerrar sessão
      operationId: platformLogout
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Logged out

  /auth/me:
    get:
      tags: [Auth]
      summary: Operador autenticado
      operationId: platformMe
      security:
        - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformOperator'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /entities:
    get:
      tags: [Entities]
      summary: Listar entidades
      operationId: listEntities
      security:
        - bearerAuth: []
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Busca por nome ou slug
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/EntityStatus'
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Entities]
      summary: Criar entidade
      operationId: createEntity
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEntityRequest'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Entity'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          description: Slug or CNPJ conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /entities/{id}:
    get:
      tags: [Entities]
      summary: Detalhe da entidade
      operationId: getEntity
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EntityId'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Entity'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Entities]
      summary: Atualizar entidade (slug imutável)
      operationId: updateEntity
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EntityId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEntityRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Entity'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'

  /entities/{id}/status:
    patch:
      tags: [Entities]
      summary: Ativar ou desativar entidade
      operationId: updateEntityStatus
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EntityId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  $ref: '#/components/schemas/EntityStatus'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Entity'
        '404':
          $ref: '#/components/responses/NotFound'

  /entities/{id}/audit-logs:
    get:
      tags: [Entities]
      summary: Trilha de auditoria da entidade
      operationId: getEntityAuditLogs
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EntityId'
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogListResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT with scope=platform

  parameters:
    EntityId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    EntityStatus:
      type: string
      enum: [ACTIVE, INACTIVE]

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    LoginResponse:
      type: object
      required: [token, operator]
      properties:
        token:
          type: string
        expiresIn:
          type: string
          example: 8h
        operator:
          $ref: '#/components/schemas/PlatformOperator'

    PlatformOperator:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        status:
          type: string
          enum: [ACTIVE, INACTIVE]

    Entity:
      type: object
      required: [id, name, slug, status, tenantAccessUrl, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        status:
          $ref: '#/components/schemas/EntityStatus'
        cnpj:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        tenantAccessUrl:
          type: string
          example: /t/prefeitura-exemplo/login
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateEntityRequest:
      type: object
      required: [name, slug]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 200
        slug:
          type: string
          pattern: '^[a-z0-9]([a-z0-9-]{1,48}[a-z0-9])?$'
        cnpj:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        phone:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        acknowledgeCnpjDuplicate:
          type: boolean
          default: false
          description: Required true if CNPJ already exists

    UpdateEntityRequest:
      type: object
      properties:
        name:
          type: string
        cnpj:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        acknowledgeCnpjDuplicate:
          type: boolean

    EntityListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Entity'
        pagination:
          $ref: '#/components/schemas/Pagination'

    AuditLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        action:
          type: string
        resource:
          type: string
        previousValue:
          type: object
          nullable: true
        newValue:
          type: object
          nullable: true
        operatorId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time

    AuditLogListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AuditLog'
        pagination:
          $ref: '#/components/schemas/Pagination'

    Pagination:
      type: object
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object

    ValidationErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
      example:
        code: VALIDATION_ERROR
        message: Invalid input
        details:
          slug: Slug is reserved

  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
